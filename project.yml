name: BoardGameApp
options:
  bundleIdPrefix: com.sanchitb.boardgamerecorder
  deploymentTarget:
    iOS: "26.0"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    CODE_SIGN_IDENTITY: ""
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"

configFiles:
  Debug: Config/Secrets.xcconfig
  Release: Config/Secrets.xcconfig

targets:
  BoardGameApp:
    type: application
    platform: iOS
    sources:
      - path: BoardGameApp
    resources:
      - path: BoardGameApp/Assets.xcassets
    info:
      path: BoardGameApp/Info.plist
      properties:
        CFBundleDisplayName: Board Game
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        LSRequiresIPhoneOS: true
        UILaunchScreen:
          UIColorName: AccentColor
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
        NSLocalNetworkUsageDescription: Connects to the Board Game server running on your local network.
        ServerBaseURL: $(SERVER_BASE_URL)
    entitlements:
      path: BoardGameApp/BoardGameApp.entitlements
      properties:
        com.apple.developer.applesignin:
          - Default
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sanchitb.boardgamerecorder
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MACCATALYST: NO
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_USER_SCRIPT_SANDBOXING: YES
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_ENTITLEMENTS: BoardGameApp/BoardGameApp.entitlements
        # Xcode 26 ships Debug builds as a thin stub binary + .debug.dylib
        # loaded via @rpath. Speeds up SwiftUI Previews, but the stub's rpath
        # resolution depends on environment hints Xcode injects via its
        # debugserver — so the app renders fine via ⌘R but cold-launches
        # (tapping the icon, or running through TestFlight) draw a blank
        # white screen because the dylib never wires into the SwiftUI scene.
        # Disabling this falls back to a single-binary Debug build; Previews
        # still work via the older mechanism, just a hair slower.
        ENABLE_DEBUG_DYLIB: NO

  BoardGameAppTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: BoardGameAppTests
    dependencies:
      - target: BoardGameApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sanchitb.boardgamerecorder.tests
        GENERATE_INFOPLIST_FILE: YES
